name: 🚀 Cool Dev Workflow - Hello Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-run:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: backend   # 👈 this sets default folder

    strategy:
      matrix:
        node-version: [16, 18, 20]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: 📦 Install Dependencies
        run: |
          echo "Installing dependencies in backend..."
          npm install || echo "No package.json found, skipping"

      - name: 🧪 Run Tests
        run: npm test || echo "No tests found, skipping"

      - name: 🎯 Print Hello World with Version
        run: |
          echo "Hello World from backend using Node ${{ matrix.node-version }}"

      - name: 🌍 Show Current Directory
        run: |
          echo "Current directory:"
          pwd
          ls -la

      - name: 🎉 Final Message
        run: echo "Workflow completed successfully 🚀"